apiVersion: apps/v1
kind: Deployment
metadata:
  name: explanation
  namespace: risk-platform
  labels:
    app: explanation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: explanation
  template:
    metadata:
      labels:
        app: explanation
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: explanation
          image: explanation:latest
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 50060
            - name: metrics
              containerPort: 9100
          envFrom:
            - configMapRef:
                name: explanation-config
            - secretRef:
                name: explanation-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            grpc:
              port: 50060
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50060
            initialDelaySeconds: 15
            periodSeconds: 20
