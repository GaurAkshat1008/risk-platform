apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: risk-platform
  labels:
    app: ingestion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9093"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ingestion
          image: ingestion:latest
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 50053
            - name: metrics
              containerPort: 9093
          envFrom:
            - configMapRef:
                name: ingestion-config
            - secretRef:
                name: ingestion-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            grpc:
              port: 50053
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50053
            initialDelaySeconds: 15
            periodSeconds: 20
