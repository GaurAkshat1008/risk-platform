apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-config
  namespace: risk-platform
  labels:
    app: tenant-config
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tenant-config
  template:
    metadata:
      labels:
        app: tenant-config
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: tenant-config
          image: tenant-config:latest
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 50052
            - name: metrics
              containerPort: 9091
          envFrom:
            - configMapRef:
                name: tenant-config-config
            - secretRef:
                name: tenant-config-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            grpc:
              port: 50052
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50052
            initialDelaySeconds: 15
            periodSeconds: 20