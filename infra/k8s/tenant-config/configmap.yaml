apiVersion: v1
kind: ConfigMap
metadata:
  name: tenant-config-config
  namespace: risk-platform
data:
  SERVICE_NAME: "tenant-config"
  SERVICE_ENV: "production"
  LOG_LEVEL: "info"
  GRPC_ADDR: ":50052"
  METRICS_ADDR: ":9091"
  REDIS_ADDR: "redis.infra.svc.cluster.local:6379"
  OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector.infra.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "tenant-config"
  OTEL_ENVIRONMENT: "production"
  KAFKA_BROKERS: "kafka.infra.svc.cluster.local:9092"
  KAFKA_TENANT_TOPIC: "tenant.events"