apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-trail
  namespace: risk-platform
  labels:
    app: audit-trail
spec:
  replicas: 2
  selector:
    matchLabels:
      app: audit-trail
  template:
    metadata:
      labels:
        app: audit-trail
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9099"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: audit-trail
          image: audit-trail:latest
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 50059
            - name: metrics
              containerPort: 9099
          envFrom:
            - configMapRef:
                name: audit-trail-config
            - secretRef:
                name: audit-trail-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            grpc:
              port: 50059
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50059
            initialDelaySeconds: 15
            periodSeconds: 20
