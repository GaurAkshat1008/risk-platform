apiVersion: v1
kind: ConfigMap
metadata:
  name: audit-trail-config
  namespace: risk-platform
data:
  LOG_LEVEL: "info"
  GRPC_ADDR: ":50059"
  METRICS_ADDR: ":9099"
  OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector.infra.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "audit-trail"
  OTEL_ENVIRONMENT: "production"
  KAFKA_BROKERS: "kafka.infra.svc.cluster.local:9092"
  KAFKA_TOPICS: "payments.received,rules.evaluated,risk.evaluated,decision.made,case.created,case.escalated,case.resolved"
  KAFKA_CONSUMER_GROUP: "audit-trail-service"
