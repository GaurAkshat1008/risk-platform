apiVersion: v1
kind: ConfigMap
metadata:
  name: case-management-config
  namespace: risk-platform
data:
  LOG_LEVEL: "info"
  GRPC_ADDR: ":50057"
  METRICS_ADDR: ":9097"
  REDIS_ADDR: "redis.infra.svc.cluster.local:6379"
  OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector.infra.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "case-management"
  OTEL_ENVIRONMENT: "production"
  KAFKA_BROKERS: "kafka.infra.svc.cluster.local:9092"
  KAFKA_DECISION_TOPIC: "decision.made"
  KAFKA_CASE_TOPIC: "case.created"
  KAFKA_CONSUMER_GROUP: "case-management-service"
