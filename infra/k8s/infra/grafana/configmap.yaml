apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: infra
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.infra.svc.cluster.local:9090
        isDefault: true
        editable: true
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger.infra.svc.cluster.local:16686
        editable: true
