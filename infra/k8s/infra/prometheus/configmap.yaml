apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: infra
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # ── OTel Collector ──
      - job_name: "otel-collector"
        static_configs:
          - targets: ["otel-collector.infra.svc.cluster.local:8889"]

      # ── Identity Access ──
      - job_name: "identity-access"
        static_configs:
          - targets: ["identity-access.risk-platform.svc.cluster.local:9090"]

      # ── Tenant Config ──
      - job_name: "tenant-config"
        static_configs:
          - targets: ["tenant-config.risk-platform.svc.cluster.local:9091"]

      # ── Ingestion ──
      - job_name: "ingestion"
        static_configs:
          - targets: ["ingestion.risk-platform.svc.cluster.local:9093"]

      # ── Risk Orchestrator ──
      - job_name: "risk-orchestrator"
        static_configs:
          - targets: ["risk-orchestrator.risk-platform.svc.cluster.local:9094"]

      # ── Rules Engine ──
      - job_name: "rules-engine"
        static_configs:
          - targets: ["rules-engine.risk-platform.svc.cluster.local:9095"]

      # ── Decision ──
      - job_name: "decision"
        static_configs:
          - targets: ["decision.risk-platform.svc.cluster.local:9096"]

      # ── Case Management ──
      - job_name: "case-management"
        static_configs:
          - targets: ["case-management.risk-platform.svc.cluster.local:9097"]

      # ── Workflow ──
      - job_name: "workflow"
        static_configs:
          - targets: ["workflow.risk-platform.svc.cluster.local:9098"]

      # ── Audit Trail ──
      - job_name: "audit-trail"
        static_configs:
          - targets: ["audit-trail.risk-platform.svc.cluster.local:9099"]

      # ── Explanation ──
      - job_name: "explanation"
        static_configs:
          - targets: ["explanation.risk-platform.svc.cluster.local:9100"]

      # ── Notification ──
      - job_name: "notification"
        static_configs:
          - targets: ["notification.risk-platform.svc.cluster.local:9101"]

      # ── Log Ingestion ──
      - job_name: "log-ingestion"
        static_configs:
          - targets: ["log-ingestion.risk-platform.svc.cluster.local:9102"]

      # ── Ops Query ──
      - job_name: "ops-query"
        static_configs:
          - targets: ["ops-query.risk-platform.svc.cluster.local:9103"]

      # ── GraphQL BFF ──
      - job_name: "graphql-bff"
        static_configs:
          - targets: ["graphql-bff.risk-platform.svc.cluster.local:9104"]
