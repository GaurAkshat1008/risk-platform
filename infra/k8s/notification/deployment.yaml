apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: risk-platform
  labels:
    app: notification
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9101"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: notification
          image: notification:latest
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 50061
            - name: metrics
              containerPort: 9101
          envFrom:
            - configMapRef:
                name: notification-config
            - secretRef:
                name: notification-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            grpc:
              port: 50061
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50061
            initialDelaySeconds: 15
            periodSeconds: 20
