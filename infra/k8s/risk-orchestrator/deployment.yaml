apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-orchestrator
  namespace: risk-platform
  labels:
    app: risk-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-orchestrator
  template:
    metadata:
      labels:
        app: risk-orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9094"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: risk-orchestrator
          image: risk-orchestrator:latest
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 50054
            - name: metrics
              containerPort: 9094
          envFrom:
            - configMapRef:
                name: risk-orchestrator-config
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 256Mi
          readinessProbe:
            grpc:
              port: 50054
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50054
            initialDelaySeconds: 15
            periodSeconds: 20
