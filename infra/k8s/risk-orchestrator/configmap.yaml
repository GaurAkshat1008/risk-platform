apiVersion: v1
kind: ConfigMap
metadata:
  name: risk-orchestrator-config
  namespace: risk-platform
data:
  SERVICE_NAME: "risk-orchestrator"
  SERVICE_ENV: "production"
  LOG_LEVEL: "info"
  GRPC_ADDR: ":50054"
  METRICS_ADDR: ":9094"
  REDIS_ADDR: "redis.infra.svc.cluster.local:6379"
  OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector.infra.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "risk-orchestrator"
  OTEL_ENVIRONMENT: "production"
  KAFKA_BROKERS: "kafka.infra.svc.cluster.local:9092"
  KAFKA_PAYMENTS_TOPIC: "payments.received"
  KAFKA_RISK_TOPIC: "risk.evaluated"
  KAFKA_CONSUMER_GROUP: "risk-orchestrator"
  RULES_ENGINE_ADDR: "rules-engine.risk-platform.svc.cluster.local:50055"
  LATENCY_BUDGET_MS: "150"
