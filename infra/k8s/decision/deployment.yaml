apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision
  namespace: risk-platform
  labels:
    app: decision
spec:
  replicas: 2
  selector:
    matchLabels:
      app: decision
  template:
    metadata:
      labels:
        app: decision
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9096"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: decision
          image: decision:latest
          imagePullPolicy: Never
          ports:
            - name: grpc
              containerPort: 50056
            - name: metrics
              containerPort: 9096
          envFrom:
            - configMapRef:
                name: decision-config
            - secretRef:
                name: decision-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            grpc:
              port: 50056
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50056
            initialDelaySeconds: 15
            periodSeconds: 20
