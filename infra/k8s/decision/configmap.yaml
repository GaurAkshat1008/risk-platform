apiVersion: v1
kind: ConfigMap
metadata:
  name: decision-config
  namespace: risk-platform
data:
  SERVICE_NAME: "decision"
  SERVICE_ENV: "production"
  LOG_LEVEL: "info"
  GRPC_ADDR: ":50056"
  METRICS_ADDR: ":9096"
  OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector.infra.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "decision"
  OTEL_ENVIRONMENT: "production"
  KAFKA_BROKERS: "kafka.infra.svc.cluster.local:9092"
  KAFKA_RISK_TOPIC: "risk.evaluated"
  KAFKA_DECISION_TOPIC: "decision.made"
  KAFKA_CONSUMER_GROUP: "decision-service"
