global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── OTel Collector re-exported metrics ──
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  # ── Identity Access ──
  - job_name: "identity-access"
    static_configs:
      - targets: ["host.docker.internal:9090"]
    metrics_path: /metrics

  # ── Tenant Config ──
  - job_name: "tenant-config"
    static_configs:
      - targets: ["host.docker.internal:9091"]

  # ── Ingestion ──
  - job_name: "ingestion"
    static_configs:
      - targets: ["host.docker.internal:9093"]

  # ── Risk Orchestrator ──
  - job_name: "risk-orchestrator"
    static_configs:
      - targets: ["host.docker.internal:9094"]

  # ── Rules Engine ──
  - job_name: "rules-engine"
    static_configs:
      - targets: ["host.docker.internal:9095"]

  # ── Decision ──
  - job_name: "decision"
    static_configs:
      - targets: ["host.docker.internal:9096"]

  # ── Case Management ──
  - job_name: "case-management"
    static_configs:
      - targets: ["host.docker.internal:9097"]

  # ── Workflow ──
  - job_name: "workflow"
    static_configs:
      - targets: ["host.docker.internal:9098"]

  # ── Audit Trail ──
  - job_name: "audit-trail"
    static_configs:
      - targets: ["host.docker.internal:9099"]

  # ── Explanation ──
  - job_name: "explanation"
    static_configs:
      - targets: ["host.docker.internal:9100"]

  # ── Notification ──
  - job_name: "notification"
    static_configs:
      - targets: ["host.docker.internal:9101"]

  # ── Log Ingestion ──
  - job_name: "log-ingestion"
    static_configs:
      - targets: ["host.docker.internal:9102"]

  # ── Ops Query ──
  - job_name: "ops-query"
    static_configs:
      - targets: ["host.docker.internal:9103"]

  # ── GraphQL BFF ──
  - job_name: "graphql-bff"
    static_configs:
      - targets: ["host.docker.internal:9104"]
